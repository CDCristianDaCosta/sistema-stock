<!DOCTYPE html>
<html>
<head>
    <title>Sistema de Ventas</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Iconos -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

    <style>
        body {
            display: flex;
        }

        .sidebar {
            width: 250px;
            height: 100vh;
            background: #1e1e2f;
            color: white;
            padding: 20px;
        }

        .sidebar a {
            display: block;
            color: white;
            padding: 10px;
            text-decoration: none;
            margin-bottom: 10px;
            border-radius: 5px;
        }

        .sidebar a:hover {
            background: #343a40;
        }

        .content {
            flex: 1;
            padding: 20px;
            background: #f5f6fa;
        }
        img{
            overflow:hidden;
            
        }
        img:hover{
            transform: scale(1.2);
        }
    </style>
</head>

<body>

<div class="sidebar">
    <h3>💼 Sistema</h3>

    <a href="/dashboard/"><i class="fa fa-home"></i> Inicio</a>
    <a href="/productos/"><i class="fa fa-box"></i> Productos</a>
    <a href="/ventas/"><i class="fa fa-cash-register"></i> Ventas</a>
    <a href="/ventas/reporte/"><i class="fa fa-chart-bar"></i> Reportes</a>
    <a href="/ventas/grafico/"><i class="fa fa-chart-line"></i> Estadísticas</a>

    <hr>

    <a href="/admin/logout/"><i class="fa fa-sign-out-alt"></i> Cerrar sesión</a>
</div>

<div class="content">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
