<!DOCTYPE html>
<html>

<head>

<title>Ticket</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="container mt-4">

<h3>Sistema de Ventas</h3>

<hr>

<p><b>Venta Nº:</b> {{venta.id}}</p>
<p><b>Fecha:</b> {{venta.fecha}}</p>

<table class="table">

<tr>
<th>Producto</th>
<th>Cantidad</th>
<th>Precio</th>
<th>Subtotal</th>
</tr>

{% for d in detalles %}

<tr>

<td>{{d.producto.nombre}}</td>
<td>{{d.cantidad}}</td>
<td>{{d.precio}}</td>
<td>{{d.subtotal}}</td>

</tr>

{% endfor %}

</table>

<h3>Total: {{venta.total}}</h3>

<button onclick="window.print()" class="btn btn-primary">
Imprimir Ticket
</button>

<a href="/ventas" class="btn btn-success">
Nueva Venta
</a>

</body>

</html>
